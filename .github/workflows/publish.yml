name: Build & Publish to PyPI

on:
  push:
    tags:
      - "v*"          # trigger on version tags: v0.1.0, v1.2.3, ...

permissions:
  contents: read

jobs:
  # ── Build wheels for Linux / macOS / Windows ──────────────────────────────
  build:
    name: Build wheels — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: qlp-py
          command: build
          args: --release --out dist
          # Linux: build manylinux wheels (portable across distros)
          manylinux: auto

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: qlp-py/dist

  # ── Build pure sdist (source distribution) ───────────────────────────────
  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: qlp-py
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: qlp-py/dist

  # ── Publish to PyPI ───────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, sdist]
    environment: pypi
    permissions:
      id-token: write   # required for trusted publishing (no API token needed)

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
